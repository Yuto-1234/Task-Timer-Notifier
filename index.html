<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Timer Notifier</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .animate-bounce-slow { animation: bounce 2s infinite; }
        @keyframes bounce {
            0%, 100% { transform: translateY(-5%); animation-timing-function: cubic-bezier(0.8, 0, 1, 1); }
            50% { transform: translateY(0); animation-timing-function: cubic-bezier(0, 0, 0.2, 1); }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const SOUND_URLS = {
            beep: 'https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3',
            chime: 'https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3',
            bell: 'https://assets.mixkit.co/active_storage/sfx/2569/2569-preview.mp3'
        };

        function App() {
            const [tasks, setTasks] = useState(() => {
                const saved = localStorage.getItem('task-timer-tasks');
                if (saved) {
                    try {
                        // 読み込み時はすべてのタスクを停止状態にする
                        return JSON.parse(saved).map(t => ({ ...t, isActive: false, lastTick: null }));
                    } catch (e) { return []; }
                }
                return [];
            });
            const [newTaskTitle, setNewTaskTitle] = useState('');
            const [newMinutes, setNewMinutes] = useState(5);
            const [newSeconds, setNewSeconds] = useState(0);
            const [selectedSound, setSelectedSound] = useState('beep');
            const [notification, setNotification] = useState(null);
            
            const audioRef = useRef(null);
            const silentAudioRef = useRef(null);
            const wakeLockRef = useRef(null);

            // 無音の音源（1秒の無音データ）
            const SILENT_SOUND = "data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=";

            // 通知の許可を求める
            const requestPermission = async () => {
                if (!('Notification' in window)) {
                    alert("このブラウザはシステム通知に対応していないか、ファイルを開く方法（file://）では制限されています。");
                    return;
                }
                try {
                    const permission = await Notification.requestPermission();
                    if (permission === 'granted') {
                        new Notification("通知テスト", { body: "これで準備完了です！" });
                        alert("通知が許可されました！");
                    } else {
                        alert("通知が拒否されました。ブラウザの設定を確認してください。");
                    }
                } catch (e) {
                    alert("通知の設定中にエラーが発生しました: " + e.message);
                }
            };

            // 音声テスト（ブラウザの制限解除）
            const testSound = () => {
                if (audioRef.current) {
                    audioRef.current.src = SOUND_URLS.beep;
                    audioRef.current.play().then(() => {
                        audioRef.current.pause();
                        alert("音声の準備ができました！");
                    }).catch(e => {
                        console.error(e);
                        alert("音声を再生できませんでした。画面のどこかをクリックしてからもう一度試してください。");
                    });
                } else {
                    alert("オーディオの準備ができていません。");
                }
            };

            // スリープ防止（Wake Lock）
            const requestWakeLock = async () => {
                if ('wakeLock' in navigator) {
                    try {
                        wakeLockRef.current = await navigator.wakeLock.request('screen');
                    } catch (err) {
                        console.log("スリープ防止に失敗:", err.message);
                    }
                }
            };

            const releaseWakeLock = () => {
                if (wakeLockRef.current) {
                    wakeLockRef.current.release();
                    wakeLockRef.current = null;
                }
            };

            useEffect(() => {
                localStorage.setItem('task-timer-tasks', JSON.stringify(tasks));
                
                const hasActive = tasks.some(t => t.isActive);
                if (hasActive) {
                    requestWakeLock();
                    // 無音ループを開始してオーディオエンジンを維持
                    if (silentAudioRef.current) {
                        silentAudioRef.current.play().catch(e => console.log("無音再生失敗"));
                    }
                } else {
                    releaseWakeLock();
                    if (silentAudioRef.current) {
                        silentAudioRef.current.pause();
                    }
                }
            }, [tasks]);

            useEffect(() => {
                const interval = setInterval(() => {
                    const now = Date.now();
                    setTasks(prev => prev.map(task => {
                        if (task.isActive && task.remaining > 0) {
                            const lastTick = task.lastTick || now;
                            const delta = Math.floor((now - lastTick) / 1000);
                            
                            if (delta >= 1) {
                                const nextRemaining = Math.max(0, task.remaining - delta);
                                if (nextRemaining === 0) {
                                    triggerNotification(task);
                                    return { ...task, remaining: 0, isActive: false, isCompleted: true, lastTick: null };
                                }
                                return { ...task, remaining: nextRemaining, lastTick: now };
                            }
                        }
                        return task;
                    }));
                }, 1000);
                return () => clearInterval(interval);
            }, []);

            const triggerNotification = (task) => {
                setNotification(task);
                
                // システム通知を出す
                if ('Notification' in window && Notification.permission === 'granted') {
                    new Notification("時間です！", {
                        body: `「${task.title}」のタイマーが終了しました。`,
                        icon: "https://cdn-icons-png.flaticon.com/512/3602/3602145.png"
                    });
                }

                if (audioRef.current) {
                    audioRef.current.src = SOUND_URLS[task.soundType];
                    audioRef.current.play().catch(e => console.log("再生には操作が必要です"));
                }
            };

            const addTask = () => {
                if (!newTaskTitle.trim()) return;
                const duration = newMinutes * 60 + newSeconds;
                if (duration <= 0) return;
                const newTask = {
                    id: Date.now().toString(),
                    title: newTaskTitle,
                    duration,
                    remaining: duration,
                    isActive: false,
                    isCompleted: false,
                    soundType: selectedSound,
                    lastTick: null
                };
                setTasks([...tasks, newTask]);
                setNewTaskTitle('');
            };

            const toggleTask = (id) => {
                setTasks(tasks.map(t => {
                    if (t.id === id) {
                        return { 
                            ...t, 
                            isActive: !t.isActive, 
                            lastTick: !t.isActive ? Date.now() : null 
                        };
                    }
                    return t;
                }));
            };

            const resetTask = (id) => {
                setTasks(tasks.map(t => 
                    t.id === id ? { ...t, remaining: t.duration, isActive: false, isCompleted: false, lastTick: null } : t
                ));
            };

            const formatTime = (s) => {
                const m = Math.floor(s / 60);
                const sec = s % 60;
                return `${m.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
            };

            return (
                <div className="min-h-screen p-4 md:p-8">
                    <audio ref={audioRef} />
                    <audio ref={silentAudioRef} src={SILENT_SOUND} loop />
                    <div className="max-w-2xl mx-auto">
                        <header className="mb-8 text-center">
                            <h1 className="text-4xl font-bold text-slate-800 mb-2 flex items-center justify-center gap-3">
                                🔔 Task Timer
                            </h1>
                            <p className="text-slate-500 mb-4">バックグラウンドでも正確に動くタイマー</p>
                            <div className="flex justify-center gap-2">
                                <button 
                                    onClick={requestPermission}
                                    className="text-xs bg-slate-200 hover:bg-slate-300 text-slate-600 px-3 py-1 rounded-full transition-colors"
                                >
                                    通知を許可
                                </button>
                                <button 
                                    onClick={testSound}
                                    className="text-xs bg-indigo-100 hover:bg-indigo-200 text-indigo-600 px-3 py-1 rounded-full transition-colors"
                                >
                                    音声テスト
                                </button>
                            </div>
                        </header>

                        <section className="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 mb-8">
                            <div className="grid gap-4">
                                <input
                                    type="text"
                                    value={newTaskTitle}
                                    onChange={e => setNewTaskTitle(e.target.value)}
                                    placeholder="タスク名を入力..."
                                    className="w-full px-4 py-2 rounded-lg border border-slate-300 outline-none focus:ring-2 focus:ring-indigo-500"
                                />
                                <div className="flex flex-wrap gap-4 items-end">
                                    <div className="flex-1">
                                        <label className="block text-sm mb-1">時間 (分:秒)</label>
                                        <div className="flex items-center gap-2">
                                            <input type="number" value={newMinutes} onChange={e => setNewMinutes(parseInt(e.target.value)||0)} className="w-full p-2 border rounded" />
                                            <span>:</span>
                                            <input type="number" value={newSeconds} onChange={e => setNewSeconds(parseInt(e.target.value)||0)} className="w-full p-2 border rounded" />
                                        </div>
                                    </div>
                                    <div className="flex-1">
                                        <label className="block text-sm mb-1">通知音</label>
                                        <select value={selectedSound} onChange={e => setSelectedSound(e.target.value)} className="w-full p-2 border rounded bg-white">
                                            <option value="beep">デジタル・ビープ</option>
                                            <option value="chime">優しいチャイム</option>
                                            <option value="bell">クラシック・ベル</option>
                                        </select>
                                    </div>
                                    <button onClick={addTask} className="bg-indigo-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-indigo-700 transition-colors">追加</button>
                                </div>
                            </div>
                        </section>

                        <div className="space-y-4">
                            {tasks.length === 0 ? (
                                <div className="text-center py-12 text-slate-400 border-2 border-dashed rounded-2xl">タスクがありません</div>
                            ) : (
                                tasks.map(task => (
                                    <div key={task.id} className={`bg-white rounded-xl shadow-sm border p-4 flex items-center justify-between ${task.isCompleted ? 'bg-green-50 border-green-200' : 'border-slate-200'}`}>
                                        <div>
                                            <h3 className={`font-bold ${task.isCompleted ? 'text-slate-400 line-through' : ''}`}>{task.title}</h3>
                                            <div className="text-2xl font-mono font-bold text-indigo-600">{formatTime(task.remaining)}</div>
                                        </div>
                                        <div className="flex gap-2">
                                            {!task.isCompleted && (
                                                <button onClick={() => toggleTask(task.id)} className="p-2 bg-indigo-100 text-indigo-600 rounded-full">
                                                    {task.isActive ? '⏸' : '▶'}
                                                </button>
                                            )}
                                            <button onClick={() => resetTask(task.id)} className="p-2 bg-slate-100 rounded-full">🔄</button>
                                            <button onClick={() => setTasks(tasks.filter(t => t.id !== task.id))} className="p-2 bg-red-50 text-red-500 rounded-full">🗑</button>
                                        </div>
                                    </div>
                                ))
                            )}
                        </div>
                    </div>

                    {notification && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/40 backdrop-blur-sm">
                            <div className="bg-white rounded-2xl shadow-2xl p-8 max-w-sm w-full text-center relative">
                                <div className="text-4xl mb-4 animate-bounce-slow">🔔</div>
                                <h2 className="text-2xl font-bold mb-2">時間です！</h2>
                                <p className="mb-6">「<span className="text-indigo-600 font-bold">{notification.title}</span>」が終了しました。</p>
                                <button onClick={() => setNotification(null)} className="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold">了解しました</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
